<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Game - Menu</title>
    <link rel="stylesheet" href="./css/menu.css">
</head>
<body>
    <div id="splash-screen" class="splash-screen">
        <img src="./images/fundo.png" alt="Fundo Mario" class="splash-image">
        <div id="loading-overlay" class="loading-overlay">
            <img src="./images/loading.gif" alt="Carregando..." class="loading-image">
        </div>
    </div>

    <div id="menu-container" class="menu-container" style="display: none;">
        <div class="menu-content">
            <img src="./images/mario.gif" class="mario-logo" alt="Mario">
            <h1>SUPER MARIO</h1>
            <div class="menu-buttons">
                <button id="btn-iniciar" class="menu-btn btn-iniciar">INICIAR</button>
                <button id="btn-configuracoes" class="menu-btn btn-configs">CONFIGURAÇÕES</button>
                <button id="btn-creditos" class="menu-btn btn-credits">CRÉDITOS</button>
            </div>
        </div>
    </div>

    <div id="modal-configs" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>CONFIGURAÇÕES</h2>
            <div class="config-item">
                <label>Volume:</label>
                <input type="range" id="volume-slider" min="0" max="100" value="100">
            </div>
            <div class="config-item">
                <label>Dificuldade:</label>
                <select id="difficulty">
                    <option value="facil">Fácil</option>
                    <option value="normal" selected>Normal</option>
                    <option value="dificil">Difícil</option>
                </select>
            </div>
            <button id="btn-fechar-configs" class="btn-modal">FECHAR</button>
        </div>
    </div>

    <div id="modal-creditos" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>CRÉDITOS</h2>
            <p><strong>Desenvolvimento:</strong> Mario Game Project</p>
            <p><strong>Criado com:</strong> HTML, CSS, JavaScript</p>
            <p><strong>Ano:</strong> 2026</p>
            <p>Obrigado por jogar! 🎮</p>
            <button id="btn-fechar-creditos" class="btn-modal">FECHAR</button>
        </div>
    </div>

    <script src="./js/menu.js" defer></script>
</body>
</html>
