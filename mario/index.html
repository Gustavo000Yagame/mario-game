<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario game</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/script.js" defer></script>
</head>
<body>
    
    <div class="hud">
        <div class="timer">Metros: <span id="timer">0</span>m</div>
        <div class="coins">Moedas: <span id="coins">0</span></div>
    </div>
    
    <div class="game-board">
        <img src="./images/clouds.png" class="nuvem">
        <img src="./images/mario.gif" class="mario">
        <img src="./images/pipe.png" class="pipe">
        <img src="./images/Goomba.gif" class="goomba">
        <img src="./images/bandeira.gif" class="flag" id="flag">
    </div>

</body>
</html>
